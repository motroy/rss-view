name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  cancel-competing:
    runs-on: ubuntu-latest
    steps:
      - name: Set Pages source to GitHub Actions and cancel auto-deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"

          # Switch Pages source to GitHub Actions so the auto-workflow stops triggering
          curl -sf -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$REPO/pages" \
            -d '{"build_type":"workflow"}' || true

          # Cancel any 'pages build and deployment' runs for this SHA
          echo "Checking for 'pages build and deployment' runs on SHA: $SHA"
          for i in 1 2 3; do
            RUNS=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/runs?head_sha=$SHA&per_page=20" \
              | jq -r '.workflow_runs[] | select(.name | ascii_downcase | contains("pages build")) | select(.status == "queued" or .status == "in_progress") | .id' \
              || true)
            for RUN_ID in $RUNS; do
              echo "Cancelling run $RUN_ID"
              curl -sf -X POST \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/cancel" \
                && echo "Cancelled" || echo "Cancel failed (may already be done)"
            done
            if [ -z "$RUNS" ]; then
              echo "No competing runs found (attempt $i)"
              break
            fi
            sleep 5
          done

  build:
    runs-on: ubuntu-latest
    needs: cancel-competing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Elm
        run: npm install -g elm

      - name: Build Elm app
        run: |
          mkdir -p dist
          elm make src/Main.elm --optimize --output=dist/elm.js
          cp index.html dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
