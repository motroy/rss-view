name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Elm
        run: npm install -g elm

      - name: Build Elm app
        run: |
          mkdir -p dist
          elm make src/Main.elm --optimize --output=dist/elm.js
          cp index.html dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Cancel competing pages build and deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA="${{ github.sha }}"
          REPO="${{ github.repository }}"
          echo "Checking for 'pages build and deployment' runs on SHA: $SHA"
          RUNS=$(curl -sf \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/actions/runs?head_sha=$SHA&per_page=20" \
            | jq -r '.workflow_runs[] | select(.name | ascii_downcase | contains("pages build")) | select(.status == "queued" or .status == "in_progress") | .id' \
            || true)
          for RUN_ID in $RUNS; do
            echo "Cancelling run $RUN_ID"
            curl -sf -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/actions/runs/$RUN_ID/cancel" \
              && echo "Cancelled" || echo "Cancel failed (may already be done)"
          done
          if [ -n "$RUNS" ]; then
            echo "Waiting 15s for cancellation to propagate..."
            sleep 15
          else
            echo "No competing runs found"
          fi

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
