<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSS View</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-w: 280px;
      --bg: #f6f8fa;
      --surface: #ffffff;
      --surface-hover: #f3f4f6;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #636c76;
      --accent: #0969da;
      --accent-text: #ffffff;
      --badge-bg: #0969da;
      --badge-text: #ffffff;
      --error: #cf222e;
      --error-bg: #fff1f0;
      --fav: #e3a008;
      --radius: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0d1117;
        --surface: #161b22;
        --surface-hover: #21262d;
        --border: #30363d;
        --text: #e6edf3;
        --text-muted: #7d8590;
        --accent: #58a6ff;
        --accent-text: #0d1117;
        --badge-bg: #1f6feb;
        --badge-text: #ffffff;
        --error: #f85149;
        --error-bg: #160b0b;
        --fav: #e3b341;
        --shadow: 0 1px 3px rgba(0,0,0,.4);
      }
    }

    :root[data-theme="dark"] {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-hover: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #7d8590;
      --accent: #58a6ff;
      --accent-text: #0d1117;
      --badge-bg: #1f6feb;
      --badge-text: #ffffff;
      --error: #f85149;
      --error-bg: #160b0b;
      --fav: #e3b341;
      --shadow: 0 1px 3px rgba(0,0,0,.4);
    }

    :root[data-theme="light"] {
      --bg: #f6f8fa;
      --surface: #ffffff;
      --surface-hover: #f3f4f6;
      --border: #d0d7de;
      --text: #1f2328;
      --text-muted: #636c76;
      --accent: #0969da;
      --accent-text: #ffffff;
      --badge-bg: #0969da;
      --badge-text: #ffffff;
      --error: #cf222e;
      --error-bg: #fff1f0;
      --fav: #e3a008;
      --shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
    }

    /* ── Layout ────────────────────────────────────── */
    .app {
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      height: 100vh;
    }

    .app.sidebar-mini {
      grid-template-columns: 48px 1fr;
    }

    .app.sidebar-mini .logo,
    .app.sidebar-mini .add-feed,
    .app.sidebar-mini .feed-nav-title,
    .app.sidebar-mini .badge,
    .app.sidebar-mini .btn-remove,
    .app.sidebar-mini .topic-select,
    .app.sidebar-mini .topic-header,
    .app.sidebar-mini .nav-section-label,
    .app.sidebar-mini .new-topic-row,
    .app.sidebar-mini .feed-item-actions {
      display: none;
    }

    .app.sidebar-mini .sidebar-header {
      flex-direction: column;
      padding: 8px 10px;
      gap: 6px;
    }

    .app.sidebar-mini .feed-nav-item {
      justify-content: center;
      padding: 8px 4px;
    }

    .app.sidebar-mini .btn-color-dot,
    .app.sidebar-mini .label-nav-wrapper .color-palette {
      display: none;
    }

    /* ── Sidebar ───────────────────────────────────── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .logo {
      font-size: 17px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.3px;
      user-select: none;
    }

    .btn-icon {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 15px;
      height: 28px;
      width: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .12s, color .12s;
    }
    .btn-icon:hover:not(:disabled) { background: var(--surface-hover); color: var(--text); }
    .btn-icon:disabled { opacity: .4; cursor: default; }

    /* ── Feed nav ──────────────────────────────────── */
    .feed-nav {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .feed-nav-item {
      display: flex;
      align-items: center;
      gap: 6px;
      width: 100%;
      padding: 7px 10px;
      background: none;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      color: var(--text);
      font-size: 13px;
      min-width: 0;
      transition: background .1s;
    }
    .feed-nav-item:hover { background: var(--surface-hover); }
    .feed-nav-item.active {
      background: var(--accent);
      color: var(--accent-text);
    }
    .feed-nav-item.active .badge {
      background: rgba(255,255,255,.25);
      color: #fff;
    }
    .feed-nav-item.active .feed-nav-icon { color: rgba(255,255,255,.7); }
    .feed-nav-item.has-error .feed-nav-icon { color: var(--error); }

    .feed-nav-item-wrapper {
      display: flex;
      align-items: center;
      border-radius: var(--radius);
      gap: 2px;
      position: relative;
    }
    .feed-nav-item-wrapper .feed-nav-item { flex: 1; min-width: 0; }

    .feed-item-actions {
      display: flex;
      align-items: center;
      gap: 1px;
      opacity: 0;
      transition: opacity .15s;
      flex-shrink: 0;
    }
    .feed-nav-item-wrapper:hover .feed-item-actions { opacity: 1; }

    .btn-edit-name {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 13px;
      height: 24px;
      width: 24px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .1s, color .1s;
      padding: 0;
    }
    .btn-edit-name:hover { background: var(--surface-hover); color: var(--accent); }

    .feed-name-edit-row {
      display: flex;
      align-items: center;
      gap: 3px;
      flex: 1;
      padding: 3px 4px;
      min-width: 0;
    }

    .feed-name-input {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      outline: none;
      min-width: 0;
    }

    .btn-name-save,
    .btn-name-cancel {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 13px;
      height: 24px;
      width: 24px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .1s, color .1s;
      padding: 0;
    }
    .btn-name-save { color: #2da44e; }
    .btn-name-save:hover { background: color-mix(in srgb, #2da44e 12%, transparent); }
    .btn-name-cancel { color: var(--error); }
    .btn-name-cancel:hover { background: var(--error-bg); }

    .feed-nav-icon {
      font-size: 8px;
      flex-shrink: 0;
      width: 14px;
      text-align: center;
      color: var(--text-muted);
    }

    .feed-nav-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; animation: spin .8s linear infinite; font-size: 13px; }
    .error-icon { font-weight: 700; color: var(--error); font-size: 12px; }

    .badge {
      background: var(--badge-bg);
      color: var(--badge-text);
      border-radius: 10px;
      padding: 1px 6px;
      font-size: 11px;
      font-weight: 600;
      flex-shrink: 0;
    }

    .btn-remove {
      background: none;
      border: none;
      color: transparent;
      cursor: pointer;
      font-size: 16px;
      height: 26px;
      width: 26px;
      border-radius: var(--radius);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .1s, color .1s;
    }
    .feed-nav-item-wrapper:hover .btn-remove { color: var(--text-muted); }
    .btn-remove:hover { background: var(--error-bg); color: var(--error) !important; }

    /* ── Topics ────────────────────────────────────── */
    .topic-header {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 4px 2px 2px;
      margin-top: 6px;
    }

    .topic-toggle {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 3px 6px;
      border-radius: var(--radius);
      text-align: left;
      transition: background .1s, color .1s;
    }
    .topic-toggle:hover { background: var(--surface-hover); color: var(--text); }

    .topic-name { flex: 1; }

    .topic-count {
      background: var(--surface-hover);
      border-radius: 8px;
      padding: 0 5px;
      font-size: 10px;
    }

    .btn-topic-delete {
      background: none;
      border: none;
      color: transparent;
      cursor: pointer;
      font-size: 15px;
      height: 22px;
      width: 22px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .1s, color .1s;
      flex-shrink: 0;
    }
    .topic-header:hover .btn-topic-delete { color: var(--text-muted); }
    .btn-topic-delete:hover { background: var(--error-bg); color: var(--error) !important; }

    .topic-select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 11px;
      padding: 2px 2px;
      cursor: pointer;
      opacity: 0;
      transition: opacity .15s;
      max-width: 80px;
      flex-shrink: 0;
    }
    .feed-nav-item-wrapper:hover .topic-select { opacity: 1; }

    .nav-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      padding: 8px 10px 4px;
      margin-top: 4px;
    }

    .new-topic-row {
      display: flex;
      gap: 4px;
      padding: 8px 4px 4px;
      margin-top: 4px;
      border-top: 1px solid var(--border);
    }

    .new-topic-input {
      flex: 1;
      padding: 4px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      outline: none;
      min-width: 0;
    }
    .new-topic-input:focus { border-color: var(--accent); }
    .new-topic-input::placeholder { color: var(--text-muted); }

    .btn-topic-add {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      height: 26px;
      width: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .1s, color .1s;
    }
    .btn-topic-add:hover:not(:disabled) { background: var(--surface-hover); color: var(--accent); }
    .btn-topic-add:disabled { opacity: .35; cursor: default; }

    /* ── Add feed ──────────────────────────────────── */
    .add-feed {
      padding: 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .feed-input {
      flex: 1;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .15s;
      min-width: 0;
    }
    .feed-input:focus { border-color: var(--accent); }
    .feed-input::placeholder { color: var(--text-muted); }

    .btn-add {
      padding: 6px 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .btn-add:hover:not(:disabled) { opacity: .85; }
    .btn-add:disabled { opacity: .45; cursor: default; }

    /* ── Main content ──────────────────────────────── */
    .main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .main-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .main-title {
      font-size: 16px;
      font-weight: 600;
    }

    .btn-ghost {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 4px 12px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      transition: background .12s, color .12s;
    }
    .btn-ghost:hover { background: var(--surface-hover); color: var(--text); }

    .btn-fav.is-fav { color: var(--fav); border-color: var(--fav); }
    .btn-fav.is-fav:hover { background: color-mix(in srgb, var(--fav) 10%, transparent); }

    /* ── Errors ────────────────────────────────────── */
    .error-banner {
      background: var(--error-bg);
      border-bottom: 1px solid color-mix(in srgb, var(--error) 30%, transparent);
      padding: 8px 24px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
    }

    .error-item {
      font-size: 12px;
      color: var(--error);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .error-label { font-weight: 600; }

    .btn-retry {
      padding: 2px 10px;
      font-size: 11px;
      background: none;
      border: 1px solid var(--error);
      border-radius: var(--radius);
      color: var(--error);
      cursor: pointer;
      transition: background .1s;
    }
    .btn-retry:hover { background: var(--error); color: #fff; }

    /* ── Article list ──────────────────────────────── */
    .article-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .article-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      transition: box-shadow .15s;
    }
    .article-card:hover { box-shadow: 0 3px 10px rgba(0,0,0,.1); }
    .article-card.is-read { opacity: .55; }

    .article-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      font-size: 12px;
      color: var(--text-muted);
      flex-wrap: wrap;
    }

    .article-feed-name {
      font-weight: 600;
      color: var(--accent);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .article-description {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.55;
      margin-bottom: 10px;
    }

    .btn-mark-read {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      padding: 3px 10px;
      transition: background .1s, color .1s;
    }
    .btn-mark-read:hover { background: var(--surface-hover); color: var(--text); }

    /* ── Loading state ─────────────────────────────── */
    .loading-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
    }
    .loading-spinner {
      font-size: 32px;
      animation: spin .8s linear infinite;
    }

    /* ── Empty state ───────────────────────────────── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 32px;
      color: var(--text-muted);
    }

    .empty-icon { font-size: 48px; margin-bottom: 16px; }

    .empty-state h3 {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .empty-state p { font-size: 13px; margin-bottom: 8px; }

    .suggestions {
      text-align: left;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-top: 16px;
      max-width: 420px;
      width: 100%;
    }

    .suggestions-title {
      font-weight: 600;
      color: var(--text);
      margin-bottom: 10px;
      font-size: 13px;
    }

    .suggestions ul { list-style: none; display: flex; flex-direction: column; gap: 6px; }

    .suggestions li {
      font-size: 12px;
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      color: var(--accent);
      word-break: break-all;
    }

    /* ── Tab bar ────────────────────────────────────── */
    .tab-bar {
      display: flex;
      align-items: stretch;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tab-bar::-webkit-scrollbar { display: none; }

    .tab-item {
      display: flex;
      align-items: center;
      padding: 0 14px;
      height: 38px;
      border: none;
      border-right: 1px solid var(--border);
      background: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background .1s, color .1s;
      gap: 4px;
    }
    .tab-item:hover { background: var(--surface-hover); color: var(--text); }
    .tab-item.tab-active {
      background: var(--bg);
      color: var(--text);
      border-bottom: 2px solid var(--accent);
      margin-bottom: -1px;
    }

    .tab-label {
      background: none;
      border: none;
      color: inherit;
      font-size: inherit;
      cursor: pointer;
      padding: 0;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .tab-close {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 0 2px;
      border-radius: 3px;
      flex-shrink: 0;
      transition: background .1s, color .1s;
    }
    .tab-close:hover { background: var(--surface-hover); color: var(--error); }

    /* ── Article title row ─────────────────────────── */
    .article-title-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 6px;
    }

    .article-title {
      flex: 1;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      background: none;
      border: none;
      padding: 0;
      text-align: left;
      cursor: pointer;
      line-height: 1.4;
      transition: color .1s;
    }
    .article-title:hover { color: var(--accent); }
    .article-card.is-read .article-title { color: var(--text-muted); }

    .btn-fav-card {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-muted);
      padding: 0 2px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity .15s, color .15s;
    }
    .article-card:hover .btn-fav-card { opacity: 1; }
    .btn-fav-card.is-fav { opacity: 1; color: var(--fav); }
    .btn-fav-card:hover { color: var(--fav); }

    .article-external-link {
      flex-shrink: 0;
      font-size: 12px;
      color: var(--text-muted);
      text-decoration: none;
      opacity: 0;
      transition: opacity .15s, color .1s;
    }
    .article-card:hover .article-external-link { opacity: 1; }
    .article-external-link:hover { color: var(--accent); }

    /* ── Labels ────────────────────────────────────── */
    .article-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 8px;
    }

    .label-chip-sm {
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 11px;
      font-weight: 500;
    }

    .reader-labels {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      margin-bottom: 20px;
    }

    .label-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: color-mix(in srgb, var(--accent) 12%, transparent);
      color: var(--accent);
      border-radius: 12px;
      padding: 2px 8px 2px 10px;
      font-size: 12px;
      font-weight: 500;
    }

    .label-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--accent);
      font-size: 13px;
      line-height: 1;
      padding: 0;
      opacity: .6;
      transition: opacity .1s;
    }
    .label-remove:hover { opacity: 1; }

    .label-add-row {
      display: flex;
      gap: 4px;
    }

    .label-input {
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-size: 12px;
      outline: none;
      width: 120px;
      transition: border-color .15s;
    }
    .label-input:focus { border-color: var(--accent); }
    .label-input::placeholder { color: var(--text-muted); }

    .btn-label-add {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      height: 26px;
      width: 26px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .1s, color .1s;
    }
    .btn-label-add:hover:not(:disabled) { background: var(--surface-hover); color: var(--accent); }
    .btn-label-add:disabled { opacity: .35; cursor: default; }

    /* ── Article reader ─────────────────────────────── */
    .article-reader {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .reader-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .reader-body {
      flex: 1;
      overflow-y: auto;
      padding: 32px 48px;
      max-width: 780px;
      width: 100%;
      box-sizing: border-box;
    }

    .reader-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
      margin-bottom: 12px;
    }

    .reader-meta {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .reader-content {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
    }

    .reader-content p { margin-bottom: 1.1em; }
    .reader-content h1,
    .reader-content h2,
    .reader-content h3,
    .reader-content h4 {
      font-weight: 600;
      margin: 1.4em 0 .5em;
      line-height: 1.3;
    }
    .reader-content h1 { font-size: 1.4em; }
    .reader-content h2 { font-size: 1.2em; }
    .reader-content h3 { font-size: 1.05em; }
    .reader-content img { max-width: 100%; height: auto; border-radius: 4px; margin: .5em 0; }
    .reader-content a { color: var(--accent); }
    .reader-content pre,
    .reader-content code {
      font-family: 'SF Mono', SFMono-Regular, Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: .88em;
      background: var(--surface-hover);
      border-radius: 4px;
    }
    .reader-content pre { padding: 12px 16px; overflow-x: auto; }
    .reader-content code { padding: 2px 5px; }
    .reader-content pre code { padding: 0; background: none; }
    .reader-content blockquote {
      border-left: 3px solid var(--border);
      margin: 1em 0;
      padding: .5em 1em;
      color: var(--text-muted);
    }
    .reader-content ul,
    .reader-content ol { padding-left: 1.5em; margin-bottom: 1em; }
    .reader-content li { margin-bottom: .3em; }

    /* ── Scrollbars ────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* ── Theme toggle ──────────────────────────────── */
    .theme-toggle-btn {
      position: fixed;
      top: 12px;
      right: 16px;
      z-index: 100;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 16px;
      height: 30px;
      width: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      transition: background .12s, color .12s;
    }
    .theme-toggle-btn:hover { background: var(--surface-hover); color: var(--text); }

    /* ── Color palette ─────────────────────────────── */
    .color-palette {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .color-swatch {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      transition: transform .1s;
    }
    .color-swatch:hover { transform: scale(1.15); }

    .color-swatch-clear {
      background: var(--surface-hover) !important;
      border-color: var(--border) !important;
      color: var(--text-muted);
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
    }
    .color-swatch-clear:hover { color: var(--error); }

    /* ── Tab bar color dot ─────────────────────────── */
    .tab-color-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      display: inline-block;
    }

    /* ── Toolbar separator ─────────────────────────── */
    .toolbar-separator {
      width: 1px;
      height: 20px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* ── Tab color button in toolbar ───────────────── */
    .btn-tab-color {
      width: 22px;
      height: 22px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      flex-shrink: 0;
      padding: 0;
      transition: transform .1s, border-color .1s;
      background: var(--surface-hover);
    }
    .btn-tab-color:hover { transform: scale(1.1); border-color: var(--text-muted); }

    /* ── Label color button in label chip ──────────── */
    .label-chip {
      position: relative;
    }

    .label-color-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      opacity: .6;
      font-size: 12px;
      padding: 0 2px;
      line-height: 1;
      transition: opacity .1s;
      flex-shrink: 0;
    }
    .label-color-btn:hover { opacity: 1; }

    /* ── Label nav wrapper (sidebar) ───────────────── */
    .label-nav-wrapper {
      display: flex;
      flex-direction: column;
    }

    .btn-color-dot {
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: var(--radius);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity .15s;
      font-size: 12px;
      color: var(--text-muted);
    }
    .label-nav-wrapper:hover .btn-color-dot { opacity: 1; }
    .btn-color-dot:hover { background: var(--surface-hover); color: var(--text); }

    /* ── Print / Save as PDF ───────────────────────── */
    @media print {
      .sidebar,
      .tab-bar,
      .reader-toolbar,
      .reader-labels { display: none !important; }

      html, body { height: auto; overflow: visible; }

      .app {
        display: block;
        height: auto;
      }

      .main {
        display: block;
        overflow: visible;
      }

      .article-reader {
        display: block;
        overflow: visible;
      }

      .reader-body {
        max-width: 100%;
        padding: 24px;
        overflow: visible;
      }

      .reader-title { font-size: 20pt; }
      .reader-meta { font-size: 10pt; }
      .reader-content { font-size: 11pt; line-height: 1.6; }

      .reader-content a { color: #000; text-decoration: underline; }
      .reader-content pre,
      .reader-content code { background: #f5f5f5; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="./elm.js" onerror="document.getElementById('app').innerHTML='<p style=\'padding:24px;font-family:monospace;color:#cf222e\'>Failed to load elm.js — check GitHub Pages deployment.</p>'"></script>
  <script>
    const KEY_FEEDS        = 'rss-view-feeds';
    const KEY_READ         = 'rss-view-read';
    const KEY_TOPICS       = 'rss-view-topics';
    const KEY_FAVOURITES   = 'rss-view-favourites';
    const KEY_LABELS       = 'rss-view-labels';
    const KEY_FEED_NAMES   = 'rss-view-feed-names';
    const KEY_TAB_COLORS   = 'rss-view-tab-colors';
    const KEY_LABEL_COLORS = 'rss-view-label-colors';
    const KEY_THEME        = 'rss-view-theme';

    // Apply stored theme immediately to avoid flash
    (function() {
      const t = localStorage.getItem(KEY_THEME);
      if (t) document.documentElement.dataset.theme = t;
    })();

    function load(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
      catch { return fallback; }
    }

    try {
      if (typeof Elm === 'undefined') throw new Error('Elm runtime not loaded (elm.js missing or failed)');
      if (!Elm.Main) throw new Error('Elm.Main not found — module name mismatch');

      const app = Elm.Main.init({
        node: document.getElementById('app'),
        flags: {
          feedUrls:         load(KEY_FEEDS, []),
          readArticles:     load(KEY_READ, []),
          topics:           load(KEY_TOPICS, {}),
          favourites:       load(KEY_FAVOURITES, []),
          articleLabels:    load(KEY_LABELS, {}),
          customFeedTitles: load(KEY_FEED_NAMES, {}),
          darkMode: (function() {
            const s = localStorage.getItem(KEY_THEME);
            if (s === 'dark') return true;
            if (s === 'light') return false;
            return window.matchMedia('(prefers-color-scheme: dark)').matches;
          })(),
          tabColors:   load(KEY_TAB_COLORS, {}),
          labelColors: load(KEY_LABEL_COLORS, {})
        }
      });

      app.ports.saveFeedUrls.subscribe(urls => {
        localStorage.setItem(KEY_FEEDS, JSON.stringify(urls));
      });

      app.ports.saveReadArticles.subscribe(articles => {
        localStorage.setItem(KEY_READ, JSON.stringify(articles));
      });

      app.ports.saveTopics.subscribe(topics => {
        localStorage.setItem(KEY_TOPICS, JSON.stringify(topics));
      });

      app.ports.saveFavourites.subscribe(favs => {
        localStorage.setItem(KEY_FAVOURITES, JSON.stringify(favs));
      });

      app.ports.saveArticleLabels.subscribe(labels => {
        localStorage.setItem(KEY_LABELS, JSON.stringify(labels));
      });

      app.ports.saveCustomFeedTitles.subscribe(names => {
        localStorage.setItem(KEY_FEED_NAMES, JSON.stringify(names));
      });

      app.ports.saveTabColors.subscribe(colors => {
        localStorage.setItem(KEY_TAB_COLORS, JSON.stringify(colors));
      });

      app.ports.saveLabelColors.subscribe(colors => {
        localStorage.setItem(KEY_LABEL_COLORS, JSON.stringify(colors));
      });

      app.ports.setTheme.subscribe(theme => {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem(KEY_THEME, theme);
      });

      app.ports.printArticle.subscribe(() => {
        window.print();
      });

      app.ports.renderContent.subscribe(({ id, html }) => {
        requestAnimationFrame(() => {
          const el = document.getElementById(id);
          if (el) {
            el.innerHTML = html;
            el.querySelectorAll('a').forEach(a => {
              a.setAttribute('target', '_blank');
              a.setAttribute('rel', 'noopener noreferrer');
            });
            el.querySelectorAll('img').forEach(img => {
              img.style.maxWidth = '100%';
              img.style.height = 'auto';
            });
          }
        });
      });
    } catch (e) {
      document.getElementById('app').innerHTML =
        '<p style="padding:24px;font-family:monospace;color:#cf222e">RSS View init error: ' + e.message + '</p>';
    }
  </script>
</body>
</html>
